<style>
  body {
    margin: 0;
    overflow: hidden;
    background-color: #000; /* fundo preto */
  }

  #starSphere {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 300px;
    height: 300px;
    border-radius: 50%;
    overflow: visible; /* deixar as estrelas saírem levemente */
    background-color: transparent; /* transparente para ver fundo preto */
    perspective: 800px; /* para o efeito 3D */
  }

  .star {
    position: absolute;
    width: 2px;
    height: 2px;
    background: white;
    border-radius: 50%;
    opacity: 0.8;
    animation: twinkle 2s infinite alternate;
  }

  @keyframes twinkle {
    from { opacity: 0.3; }
    to { opacity: 1; }
  }
</style>

<script>
  document.addEventListener('DOMContentLoaded', () => {
    const sphere = document.createElement('div');
    sphere.id = 'starSphere';
    document.body.appendChild(sphere);

    const numStars = 200;
    const radius = 140; // metade da esfera

    for (let i = 0; i < numStars; i++) {
      const star = document.createElement('div');
      star.classList.add('star');

      // posição 3D aleatória
      const theta = Math.random() * 2 * Math.PI;
      const phi = Math.acos(2 * Math.random() - 1);
      const r = Math.random() * radius;

      const x = r * Math.sin(phi) * Math.cos(theta);
      const y = r * Math.sin(phi) * Math.sin(theta);
      const z = r * Math.cos(phi);

      star.style.transform = `translate3d(${x}px, ${y}px, ${z}px)`;
      sphere.appendChild(star);
    }
  });
</script>
